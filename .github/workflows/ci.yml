name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "21 9 * * 1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  wrapper-validation:
    name: Gradle Wrapper Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

  unit-tests:
    name: Unit Tests and Verification Tasks
    runs-on: ubuntu-latest
    needs:
      - wrapper-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests and repository checks
        run: ./gradlew test validateServerOnlySources validateRepositoryFiles --console=plain --no-daemon

  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    needs:
      - wrapper-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build --console=plain --no-daemon

      - name: Inspect jar metadata
        shell: bash
        run: |
          set -euo pipefail
          JAR="$(find build/libs -maxdepth 1 -name 'craftledger_jobs-*.jar' ! -name '*-plain.jar' | head -n 1)"
          test -n "$JAR"
          unzip -p "$JAR" META-INF/mods.toml > /tmp/craftledger-mods.toml
          grep -q 'modId="craftledger_jobs"' /tmp/craftledger-mods.toml
          grep -q 'displayTest="IGNORE_SERVER_VERSION"' /tmp/craftledger-mods.toml
          grep -q 'side="SERVER"' /tmp/craftledger-mods.toml

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: craftledger-jobs-snapshot
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 14

  server-smoke:
    name: Forge Server Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - unit-tests
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Forge server smoke test
        run: bash scripts/ci/smoke-server.sh

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: forge-server-smoke-log
          path: tmp/ci/smoke-server.log
          if-no-files-found: ignore
          retention-days: 14
