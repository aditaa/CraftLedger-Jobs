name: Feature Request
description: Suggest a feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What server/player problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the command, config, behavior, or workflow you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Economy
        - Shop
        - Jobs
        - Admin commands
        - Config
        - Documentation
        - Testing/CI
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context

