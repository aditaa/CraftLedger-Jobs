name: Bug Report
description: Report a reproducible problem with CraftLedger Jobs.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "1.20.1"
    validations:
      required: true
  - type: input
    id: forge-version
    attributes:
      label: Forge version
      placeholder: "47.4.10"
    validations:
      required: true
  - type: input
    id: mod-version
    attributes:
      label: CraftLedger Jobs version or commit
      placeholder: "0.1.0 or commit hash"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, config snippets, and what players were doing.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text

